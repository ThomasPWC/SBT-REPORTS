<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2-Stroke Production</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f3ef;--surface:#fff;--border:#e2ddd6;--text:#1a1816;--muted:#7a746c;
    --accent:#0f6e56;--accent-light:#eaf5f0;--success:#2d6e3e;--success-bg:#eaf3de;
    --danger:#c94a1e;--danger-light:#fdf0ec;--input-focus:#0f6e5633;--row-stripe:#faf9f7;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;}
  .page-wrap{max-width:680px;margin:0 auto;}
  header{margin-bottom:2rem;}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:.5rem;}
  .page-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .page-icon svg{width:22px;height:22px;fill:white;}
  h1{font-size:22px;font-weight:600;letter-spacing:-.3px;}
  .date-badge{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);margin-top:2px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem;}
  .card-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.full{grid-column:1/-1;}
  label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  input[type="text"],input[type="date"],input[type="number"]{width:100%;border:1px solid var(--border);border-radius:7px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--input-focus);}
  .section-divider{height:1px;background:var(--border);margin:1.25rem 0;}
  .rows-header{display:grid;grid-template-columns:1fr 100px 44px;gap:8px;margin-bottom:6px;}
  .rows-header span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
  .part-row{display:grid;grid-template-columns:1fr 100px 44px;gap:8px;margin-bottom:6px;align-items:center;}
  .remove-btn{background:none;border:none;cursor:pointer;padding:6px;border-radius:6px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
  .remove-btn:hover{background:var(--danger-light);color:var(--danger);}
  .remove-btn svg{width:15px;height:15px;}
  .add-row-btn{margin-top:10px;display:flex;align-items:center;gap:7px;background:none;border:1.5px dashed var(--border);border-radius:8px;padding:8px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--muted);cursor:pointer;width:100%;justify-content:center;transition:border-color .15s,color .15s,background .15s;}
  .add-row-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
  .optional-label{font-size:11px;color:var(--muted);font-style:italic;margin-left:6px;}
  .crank-section{display:grid;grid-template-columns:1fr 120px;gap:10px;align-items:end;}
  .submit-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:10px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;margin-top:1.25rem;}
  .submit-btn:hover{opacity:.9;}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;}
  .submit-btn svg{width:18px;height:18px;fill:white;}
  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .toast{display:none;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:500;margin-top:1rem;}
  .toast.success{background:var(--success-bg);color:var(--success);border:1px solid #c0dd97;}
  .toast.error{background:#fcebeb;color:#a32d2d;border:1px solid #f7c1c1;}
  .toast svg{width:18px;height:18px;flex-shrink:0;}
  @media(max-width:520px){.form-grid{grid-template-columns:1fr;}.form-group.full{grid-column:1;}.crank-section{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="page-wrap">
  <header>
    <div class="brand">
      <div class="page-icon">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg>
      </div>
      <div>
        <h1>2-Stroke Production</h1>
        <div class="date-badge" id="today-date"></div>
      </div>
    </div>
  </header>

  <!-- Header info -->
  <div class="card">
    <div class="card-label">Production Entry</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="date" />
      </div>
    </div>

    <div class="section-divider"></div>
    <div class="rows-header">
      <span>Part Number</span><span>Qty</span><span></span>
    </div>
    <div id="part-rows"></div>
    <button class="add-row-btn" onclick="addRow()">
      <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Add part
    </button>
  </div>

  <!-- Crankshaft pulled -->
  <div class="card">
    <div class="card-label">Crankshaft Pulled for Production</div>
    <div class="crank-section">
      <div class="form-group">
        <label>Crankshaft Part #</label>
        <input type="text" id="crank-part" placeholder="Part number" />
      </div>
      <div class="form-group">
        <label>Qty</label>
        <input type="number" id="crank-qty" min="1" placeholder="0" style="text-align:center;font-family:'DM Mono',monospace;" />
      </div>
    </div>
  </div>

  <!-- Quarantine to Inventory -->
  <div class="card">
    <div class="card-label">Quarantine to Inventory <span class="optional-label">optional</span></div>
    <div class="rows-header">
      <span>Part Number</span><span>Qty</span><span></span>
    </div>
    <div id="q2inv-rows"></div>
    <button class="add-row-btn" onclick="addRow('q2inv')">
      <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Add part
    </button>
  </div>

  <!-- Inventory to Quarantine -->
  <div class="card">
    <div class="card-label">Inventory to Quarantine <span class="optional-label">optional</span></div>
    <div class="rows-header">
      <span>Part Number</span><span>Qty</span><span></span>
    </div>
    <div id="inv2q-rows"></div>
    <button class="add-row-btn" onclick="addRow('inv2q')">
      <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      Add part
    </button>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitForm()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    <span id="btn-text">Submit</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="toast" id="toast"></div>
</div>

<script>
const WEBHOOK = 'https://script.google.com/macros/s/AKfycby43laZkSiiHfgu1xeZBp5zIBffYTA4xCA9kIlDY3iodGTLRCG0iHVEmDXORkxkP8yw/exec';
let counters = { main:0, q2inv:0, inv2q:0 };

function todayISO() { return new Date().toISOString().split('T')[0]; }
document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
document.getElementById('date').value = todayISO();

function addRow(section='main', part='', qty='') {
  counters[section]++;
  const id = counters[section];
  const prefix = section === 'main' ? '' : section + '-';
  const containerId = section === 'main' ? 'part-rows' : section + '-rows';
  const div = document.createElement('div');
  div.id = prefix + 'row-' + id;
  div.className = 'part-row';
  div.innerHTML = `
    <input type="text" placeholder="Part #" id="${prefix}part-${id}" value="${part}" />
    <input type="number" min="1" placeholder="0" id="${prefix}qty-${id}" value="${qty}" style="text-align:center;font-family:'DM Mono',monospace;" />
    <button class="remove-btn" onclick="removeRow('${section}',${id})">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    </button>`;
  document.getElementById(containerId).appendChild(div);
}

function removeRow(section, id) {
  const prefix = section === 'main' ? '' : section + '-';
  const containerId = section === 'main' ? 'part-rows' : section + '-rows';
  const rows = document.querySelectorAll('#' + containerId + ' .part-row');
  if (rows.length <= 1 && section === 'main') return;
  document.getElementById(prefix + 'row-' + id)?.remove();
}

function getRows(section) {
  const prefix = section === 'main' ? '' : section + '-';
  const containerId = section === 'main' ? 'part-rows' : section + '-rows';
  const rows = document.querySelectorAll('#' + containerId + ' .part-row');
  const data = [];
  rows.forEach(r => {
    const id = r.id.replace(prefix + 'row-', '');
    const part = document.getElementById(prefix + 'part-' + id)?.value.trim();
    const qty  = document.getElementById(prefix + 'qty-' + id)?.value.trim();
    if (part && qty) data.push({ part, qty });
  });
  return data;
}

function showToast(type, msg) {
  const t = document.getElementById('toast');
  t.className = 'toast ' + type;
  const icon = type === 'success'
    ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
  t.innerHTML = icon + '<span>' + msg + '</span>';
  t.style.display = 'flex';
  setTimeout(() => { t.style.display = 'none'; }, 6000);
}

async function submitForm() {
  const name  = document.getElementById('name').value.trim();
  const date  = document.getElementById('date').value;
  const rows  = getRows('main');
  const q2inv = getRows('q2inv');
  const inv2q = getRows('inv2q');
  const crankPart = document.getElementById('crank-part').value.trim();
  const crankQty  = document.getElementById('crank-qty').value.trim();

  if (!name || !date || rows.length === 0) {
    showToast('error', 'Please fill in name, date, and at least one part.');
    return;
  }

  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  btn.disabled = true; spinner.style.display = 'block'; btnText.textContent = 'Saving…';

  try {
    await fetch(WEBHOOK, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        source: '2stroke_production',
        date, name, rows, q2inv, inv2q,
        crankPulled: crankPart,
        crankPulledQty: crankQty
      })
    });
    showToast('success', '2-Stroke production saved to Google Sheets!');
    document.getElementById('part-rows').innerHTML = '';
    document.getElementById('q2inv-rows').innerHTML = '';
    document.getElementById('inv2q-rows').innerHTML = '';
    document.getElementById('crank-part').value = '';
    document.getElementById('crank-qty').value = '';
    counters = { main:0, q2inv:0, inv2q:0 };
    addRow();
    document.getElementById('date').value = todayISO();
  } catch(err) {
    showToast('error', 'Failed to save: ' + (err.message || 'Unknown error'));
  } finally {
    btn.disabled = false; spinner.style.display = 'none'; btnText.textContent = 'Submit';
  }
}

addRow();
</script>
</body>
</html>
